name: 友链移除
description: 申请移除某条友链
title: "chore(links): remove <标识>"
labels: ["request"]
body:
  - type: input
    id: slug
    attributes:
      label: 移除标识
      description: 要移除的友链标识（slug），见 src/data/links.json
      placeholder: "my-blog"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 原因
      description: 可选。简要说明移除原因，供维护者参考。
      placeholder: "对方站点已下线 / 申请者要求移除 / ……"
    validations:
      required: false
