name: On Friend Link PR Update

on:
  pull_request:
    types: [edited]

jobs:
  sync:
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'friend-link/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Sync PR body edits to branch
        uses: actions/github-script@v7
        with:
          script: |
            // Only react to body edits, ignore title-only edits.
            if (!context.payload.changes || !context.payload.changes.body) return;

            const pr = context.payload.pull_request;
            const body = pr.body.replace(/\r\n/g, "\n");

            function extractRow(title) {
              const regex = new RegExp("\\|\\s*" + title + "\\s*\\|([^|]*)\\|", "i");
              const match = body.match(regex);
              return match?.[1]?.trim() ?? "";
            }

            const name = extractRow("博客名称");
            const url = extractRow("网址");
            const description = extractRow("简介");
            const slug = extractRow("标识");

            const ref = pr.head.ref;
            const originalSlug = ref.replace(/^friend-link\//, "").replace(/-\d+$/, "");

            const fs = require("fs");
            const path = require("path");
            const linksPath = path.join(process.env.GITHUB_WORKSPACE, "src", "data", "links.json");
            const linksData = JSON.parse(fs.readFileSync(linksPath, "utf-8"));
            const entry = linksData.find(e => e.slug === originalSlug);

            const reply = (msg) => github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: msg,
            });

            // Data read failures (missing entry or unparseable table) stay silent.
            if (!entry) return;
            if (!name || !url || !description || !slug) return;

            const errors = [];
            try { new URL(url); } catch { errors.push("网址格式不合法: " + url); }
            if (!/^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$/.test(slug)) {
              errors.push("标识 只能包含英文字母、数字和连字符，且不能以连字符开头或结尾");
            }
            if (slug !== originalSlug) {
              for (const e of linksData) {
                if (e !== entry && e.slug === slug) errors.push("标识 '" + slug + "' 已被其他友链占用");
              }
            }
            if (errors.length > 0) {
              await reply("## 同步未通过校验\n\n" + errors.map(e => "- " + e).join("\n") + "\n\n请修正 PR 描述中的表格后重新编辑以触发同步。");
              return;
            }

            const slugChanged = slug !== originalSlug;
            const changed = entry.name !== name || entry.url !== url || entry.description !== description || slugChanged;
            if (!changed) return;

            entry.name = name;
            entry.url = url;
            entry.description = description;
            if (slugChanged) {
              entry.slug = slug;
              const assetsDir = path.join(process.env.GITHUB_WORKSPACE, "src", "assets", "friends");
              const oldAvatar = path.join(assetsDir, originalSlug + ".webp");
              const newAvatar = path.join(assetsDir, slug + ".webp");
              if (fs.existsSync(oldAvatar)) fs.renameSync(oldAvatar, newAvatar);
            }
            fs.writeFileSync(linksPath, JSON.stringify(linksData, null, 2) + "\n", "utf-8");

            const { execSync } = require("child_process");
            execSync("git config user.name 'github-actions[bot]'");
            execSync("git config user.email 'github-actions[bot]@users.noreply.github.com'");
            const addPaths = ['"src/data/links.json"'];
            if (slugChanged) {
              addPaths.push('"src/assets/friends/' + originalSlug + '.webp"');
              addPaths.push('"src/assets/friends/' + slug + '.webp"');
            }
            execSync("git add " + addPaths.join(" "));
            execSync('git commit -m "chore(links): apply PR #' + pr.number + ' body edits"');
            execSync("git push origin HEAD:" + ref);
