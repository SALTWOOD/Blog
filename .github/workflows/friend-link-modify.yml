name: Friend Link Modify

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  modify:
    if: >
      (github.event_name == 'issues' || github.event_name == 'issue_comment') &&
      contains(github.event.issue.body, '### 原标识') &&
      (
        github.event_name == 'issues' ||
        (github.event_name == 'issue_comment' && github.event.comment.body == '/review' && github.event.issue.state == 'open')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install WebP tools
        run: |
          if ! command -v cwebp >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y webp
          fi

      - name: Parse, validate, and process modification
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body.replace(/\r\n/g, "\n");

            function extractField(title) {
              const regex = new RegExp(`### ${title}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`, "i");
              const match = body.match(regex);
              const v = match?.[1]?.trim() ?? "";
              return v === "_No response_" ? "" : v;
            }

            const fs = require("fs");
            const path = require("path");
            const os = require("os");
            const { execSync } = require("child_process");

            const SUPPORTED_FORMATS = ["webp", "png", "jpeg", "gif", "bmp"];

            // Sniff the real format from magic bytes (more reliable than Content-Type).
            function detectImageFormat(buf) {
              if (!buf || buf.length < 12) return null;
              const ascii = (start, len) => buf.subarray(start, start + len).toString("ascii");
              if (ascii(0, 4) === "RIFF" && ascii(8, 4) === "WEBP") return "webp";
              if (buf[0] === 0x89 && ascii(1, 3) === "PNG") return "png";
              if (buf[0] === 0xff && buf[1] === 0xd8 && buf[2] === 0xff) return "jpeg";
              const gifSig = ascii(0, 6);
              if (gifSig === "GIF89a" || gifSig === "GIF87a") return "gif";
              if (buf[0] === 0x42 && buf[1] === 0x4d) return "bmp"; // "BM"
              return null;
            }

            // Download the icon and return it as a WebP buffer, converting if needed.
            async function prepareWebpAvatar(url) {
              let resp;
              try {
                resp = await fetch(url);
              } catch (e) {
                return { error: "无法访问新图标 URL: " + e.message };
              }
              if (!resp.ok) return { error: "新图标 URL 返回了非成功状态码: " + resp.status };

              const buf = Buffer.from(await resp.arrayBuffer());
              const format = detectImageFormat(buf);
              if (!format) {
                return { error: "新图标格式不受支持，支持的格式: " + SUPPORTED_FORMATS.join(" / ").toUpperCase() };
              }
              if (format === "webp") return { buffer: buf };

              const tmpDir = fs.mkdtempSync(path.join(os.tmpdir(), "avatar-"));
              const inPath = path.join(tmpDir, "input." + format);
              const outPath = path.join(tmpDir, "output.webp");
              fs.writeFileSync(inPath, buf);
              try {
                execSync(`cwebp -quiet -q 90 "${inPath}" -o "${outPath}"`, { stdio: "pipe" });
                return { buffer: fs.readFileSync(outPath) };
              } catch (e) {
                const detail = e.stderr ? e.stderr.toString().trim() : e.message;
                return { error: "新图标转换为 WebP 失败: " + detail };
              }
            }

            const originalSlug = extractField("原标识");
            const newName = extractField("新博客名称");
            const newUrl = extractField("新网址");
            const newDescription = extractField("新简介");
            const newIconUrl = extractField("新图标 URL");

            const errors = [];

            if (!originalSlug) errors.push("原标识 不能为空");

            const linksPath = path.join(process.env.GITHUB_WORKSPACE, "src", "data", "links.json");

            let linksData = [];
            let entry = null;
            if (fs.existsSync(linksPath)) {
              try {
                const raw = JSON.parse(fs.readFileSync(linksPath, "utf-8"));
                if (Array.isArray(raw)) linksData = raw;
              } catch {}
            }
            if (originalSlug) {
              entry = linksData.find(e => e.slug === originalSlug) || null;
              if (!entry) errors.push("找不到标识为 '" + originalSlug + "' 的友链");
            }

            if (!newName && !newUrl && !newDescription && !newIconUrl) {
              errors.push("请至少填写一项需要修改的字段（新博客名称 / 新网址 / 新简介 / 新图标 URL）");
            }

            if (newUrl) {
              try { new URL(newUrl); } catch { errors.push("新网址格式不合法: " + newUrl); }
              for (const e of linksData) {
                if (e !== entry && e.url === newUrl) errors.push("新网址已被其他友链占用: " + newUrl);
              }
            }

            if (newIconUrl) {
              try { new URL(newIconUrl); } catch { errors.push("新图标 URL 格式不合法: " + newIconUrl); }
            }

            let avatarBuffer = null;
            if (errors.length === 0 && newIconUrl) {
              const result = await prepareWebpAvatar(newIconUrl);
              if (result.error) errors.push(result.error);
              else avatarBuffer = result.buffer;
            }

            if (errors.length > 0) {
              const comment = [
                "## 校验未通过",
                "",
                ...errors.map(e => "- " + e),
                "",
                "请修正上面的问题后，直接评论 `/review` 以触发自动检查或者等待维护者审查。",
              ].join("\n");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
              return;
            }

            if (newName) entry.name = newName;
            if (newUrl) entry.url = newUrl;
            if (newDescription) entry.description = newDescription;

            if (newIconUrl) {
              const avatarPath = path.join(process.env.GITHUB_WORKSPACE, "src", "assets", "friends", originalSlug + ".webp");
              fs.mkdirSync(path.dirname(avatarPath), { recursive: true });
              fs.writeFileSync(avatarPath, avatarBuffer);
            }

            fs.writeFileSync(linksPath, JSON.stringify(linksData, null, 2) + "\n", "utf-8");

            const changes = [];
            if (newName) changes.push("博客名称");
            if (newUrl) changes.push("网址");
            if (newDescription) changes.push("简介");
            if (newIconUrl) changes.push("图标");

            const branchName = "friend-link/" + originalSlug + "-" + Date.now();
            execSync("git config user.name 'github-actions[bot]'");
            execSync("git config user.email 'github-actions[bot]@users.noreply.github.com'");
            execSync("git checkout -b " + branchName);
            const addPaths = ['"src/data/links.json"'];
            if (newIconUrl) addPaths.push('"src/assets/friends/' + originalSlug + '.webp"');
            execSync("git add " + addPaths.join(" "));
            const opener = context.payload.issue.user;
            const coAuthorTrailer = "Co-Authored-By: " + opener.login + " <" + opener.id + "+" + opener.login + "@users.noreply.github.com>";
            const subject = "chore(links): update " + entry.name.replace(/"/g, '\\"');
            execSync('git commit -m "' + subject + '" -m "' + coAuthorTrailer + '"');
            execSync("git push origin " + branchName);

            const prBody = [
              "来自 #" + context.issue.number + " 的友链修改申请",
              "This PR closes #" + context.issue.number + ".",
              "",
              "本次修改：" + changes.join("、"),
              "",
              "| 字段 | 内容 |",
              "|------|------|",
              "| 博客名称 | " + entry.name + " |",
              "| 网址 | " + entry.url + " |",
              "| 简介 | " + entry.description + " |",
              "| 标识 | " + entry.slug + " |",
            ];

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "chore(links): update " + entry.name,
              head: branchName,
              base: "main",
              body: prBody.join("\n"),
            });
