name: Friend Link Remove

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  remove:
    if: >
      (github.event_name == 'issues' || github.event_name == 'issue_comment') &&
      contains(github.event.issue.body, '### 移除标识') &&
      (
        github.event_name == 'issues' ||
        (github.event_name == 'issue_comment' && github.event.comment.body == '/review' && github.event.issue.state == 'open')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse, validate, and process removal
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body.replace(/\r\n/g, "\n");

            function extractField(title) {
              const regex = new RegExp(`### ${title}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`, "i");
              const match = body.match(regex);
              const v = match?.[1]?.trim() ?? "";
              return v === "_No response_" ? "" : v;
            }

            const slug = extractField("移除标识");

            const errors = [];
            if (!slug) errors.push("移除标识 不能为空");

            const fs = require("fs");
            const path = require("path");
            const linksPath = path.join(process.env.GITHUB_WORKSPACE, "src", "links", "links.json");

            let linksData = [];
            let entry = null;
            if (fs.existsSync(linksPath)) {
              try {
                const raw = JSON.parse(fs.readFileSync(linksPath, "utf-8"));
                if (Array.isArray(raw)) linksData = raw;
              } catch {}
            }
            if (slug) {
              entry = linksData.find(e => e.slug === slug) || null;
              if (!entry) errors.push("找不到标识为 '" + slug + "' 的友链");
            }

            if (errors.length > 0) {
              const comment = [
                "## 校验未通过",
                "",
                ...errors.map(e => "- " + e),
                "",
                "请修正上面的问题后，直接评论 `/review` 以触发自动检查或者等待维护者审查。",
              ].join("\n");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
              return;
            }

            linksData = linksData.filter(e => e.slug !== slug);

            const avatarPath = path.join(process.env.GITHUB_WORKSPACE, "src", "assets", "friends", slug + ".webp");
            const avatarExisted = fs.existsSync(avatarPath);
            if (avatarExisted) fs.unlinkSync(avatarPath);

            fs.writeFileSync(linksPath, JSON.stringify(linksData, null, 2) + "\n", "utf-8");

            const { execSync } = require("child_process");
            const branchName = "friend-link-remove/" + slug + "-" + Date.now();
            execSync("git config user.name 'github-actions[bot]'");
            execSync("git config user.email 'github-actions[bot]@users.noreply.github.com'");
            execSync("git checkout -b " + branchName);
            const addPaths = ['"src/links/links.json"'];
            if (avatarExisted) addPaths.push('"src/assets/friends/' + slug + '.webp"');
            execSync("git add " + addPaths.join(" "));
            const opener = context.payload.issue.user;
            const coAuthorTrailer = "Co-Authored-By: " + opener.login + " <" + opener.id + "+" + opener.login + "@users.noreply.github.com>";
            const subject = "chore(links): remove " + entry.name.replace(/"/g, '\\"');
            execSync('git commit -m "' + subject + '" -m "' + coAuthorTrailer + '"');
            execSync("git push origin " + branchName);

            const prBody = [
              "来自 #" + context.issue.number + " 的友链移除申请",
              "This PR closes #" + context.issue.number + ".",
              "",
              "本次移除的友链：",
              "",
              "| 字段 | 内容 |",
              "|------|------|",
              "| 博客名称 | " + entry.name + " |",
              "| 网址 | " + entry.url + " |",
              "| 简介 | " + entry.description + " |",
              "| 标识 | " + entry.slug + " |",
            ];

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "chore(links): remove " + entry.name,
              head: branchName,
              base: "main",
              body: prBody.join("\n"),
            });
